<svg width="400" height="210" viewBox="0 0 400 210" xmlns="http://www.w3.org/2000/svg">
  <!-- No background — transparent -->

  <!-- Messy text (left side — input with errors) -->
  <g transform="translate(65, 55)">
    <!-- Scribbled lines representing rough text -->
    <line x1="0" y1="0" x2="40" y2="0" stroke="#C084FC" stroke-width="2.5" stroke-linecap="round" opacity="0.4"/>
    <line x1="0" y1="10" x2="35" y2="10" stroke="#C084FC" stroke-width="2.5" stroke-linecap="round" opacity="0.4"/>
    <line x1="0" y1="20" x2="42" y2="20" stroke="#C084FC" stroke-width="2.5" stroke-linecap="round" opacity="0.4"/>
    <!-- Squiggly underlines (errors) -->
    <path d="M2,5 Q6,8 10,5 Q14,2 18,5 Q22,8 26,5" fill="none" stroke="#F87171" stroke-width="1.2" opacity="0.6"/>
    <path d="M5,25 Q9,28 13,25 Q17,22 21,25" fill="none" stroke="#F87171" stroke-width="1.2" opacity="0.6"/>
  </g>

  <!-- Connector: messy text to brain -->
  <line x1="118" y1="65" x2="158" y2="65" stroke="#C084FC" stroke-width="1.5" stroke-dasharray="4 3" opacity="0.5"/>
  <circle cx="138" cy="65" r="2.5" fill="#C084FC" opacity="0.5"/>

  <!-- AI Brain / Magic wand (center — the transformation) -->
  <g transform="translate(200, 65)">
    <!-- Outer circle -->
    <circle cx="0" cy="0" r="28" fill="none" stroke="#C084FC" stroke-width="2.5"/>
    <!-- Sparkle / magic star (4-pointed) -->
    <path d="M0,-16 L3,-3 L16,0 L3,3 L0,16 L-3,3 L-16,0 L-3,-3 Z" fill="#C084FC" opacity="0.7"/>
    <!-- Inner glow dot -->
    <circle cx="0" cy="0" r="3" fill="#C084FC" opacity="0.9"/>
    <!-- Small sparkles around -->
    <circle cx="20" cy="-20" r="1.5" fill="#C084FC" opacity="0.5"/>
    <circle cx="-22" cy="18" r="1" fill="#C084FC" opacity="0.4"/>
    <circle cx="24" cy="14" r="1.2" fill="#C084FC" opacity="0.45"/>
  </g>

  <!-- Connector: brain to clean text -->
  <line x1="242" y1="65" x2="282" y2="65" stroke="#C084FC" stroke-width="1.5" stroke-dasharray="4 3" opacity="0.5"/>
  <circle cx="262" cy="65" r="2.5" fill="#C084FC" opacity="0.5"/>

  <!-- Clean text (right side — polished output) -->
  <g transform="translate(295, 55)">
    <!-- Clean, aligned lines representing polished text -->
    <line x1="0" y1="0" x2="40" y2="0" stroke="#C084FC" stroke-width="2.5" stroke-linecap="round" opacity="0.9"/>
    <line x1="0" y1="10" x2="35" y2="10" stroke="#C084FC" stroke-width="2.5" stroke-linecap="round" opacity="0.9"/>
    <line x1="0" y1="20" x2="42" y2="20" stroke="#C084FC" stroke-width="2.5" stroke-linecap="round" opacity="0.9"/>
    <!-- Checkmark -->
    <g transform="translate(48, 10)">
      <circle cx="0" cy="0" r="10" fill="none" stroke="#34D399" stroke-width="1.5" opacity="0.8"/>
      <polyline points="-5,0 -1,4 6,-4" fill="none" stroke="#34D399" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" opacity="0.8"/>
    </g>
  </g>

  <!-- Logotype -->
  <text x="200" y="140" text-anchor="middle" font-family="'Courier New', monospace" font-size="28" font-weight="700" fill="#E8E8F0" letter-spacing="-0.5">reword-service</text>

  <!-- Tagline -->
  <text x="200" y="168" text-anchor="middle" font-family="'Courier New', monospace" font-size="11" fill="#C084FC" opacity="0.7" letter-spacing="1.5">select · reword · paste</text>

  <!-- macOS badge -->
  <text x="200" y="192" text-anchor="middle" font-family="'Courier New', monospace" font-size="10" fill="#C084FC" opacity="0.4" letter-spacing="1">macOS Quick Action</text>
</svg>
